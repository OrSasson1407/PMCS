name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  quick-check:
    name: Quick Compile Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-gateway/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install Node deps
        run: cd api-gateway && npm ci

      - name: TypeScript check
        run: cd api-gateway && npx tsc --noEmit

      - name: Go build
        run: cd ast-engine && sudo apt-get install -y gcc && CGO_ENABLED=1 go build ./...

      - name: Summary
        run: |
          echo "## PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript: OK" >> $GITHUB_STEP_SUMMARY
          echo "- Go build:   OK" >> $GITHUB_STEP_SUMMARY
