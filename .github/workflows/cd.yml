name: PMCS CD

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Docker images
        run: |
          docker compose build
          echo "Built images for ${{ steps.version.outputs.VERSION }}"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.VERSION }}';
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `PMCS ${tag}`,
              body: `## PMCS ${tag}\n\nAutomated release for tag ${tag}.\n\n### Deploy\n\`\`\`bash\ngit checkout ${tag}\nmake prod\n\`\`\``,
              draft: false,
              prerelease: tag.includes('alpha') || tag.includes('beta') || tag.includes('rc'),
            });
            console.log('Release created:', release.html_url);
