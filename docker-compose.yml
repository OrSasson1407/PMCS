services:
  api-gateway:
    build: ./api-gateway
    ports:
      - '3010:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://pmcs:pmcs@postgres:5432/pmcs
      - JWT_SECRET=change_me_in_production_please
      - AST_ENGINE_URL=http://ast-engine:50051
      - GITHUB_WEBHOOK_SECRET=pmcs-webhook-secret-dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  ast-engine:
    build: ./ast-engine
    ports:
      - '50052:50051'
    environment:
      - PORT=50051
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://pmcs:pmcs@postgres:5432/pmcs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:50051/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web-dashboard:
    build: ./web-dashboard
    ports:
      - '8080:80'
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=pmcs
      - POSTGRES_PASSWORD=pmcs
      - POSTGRES_DB=pmcs
    ports:
      - '5436:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmcs -d pmcs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6386:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
